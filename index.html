<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <title>CloudOptima | Multi-Cloud Advisor</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        /* CSS LOCK: Forces everything onto one screen */
        body { 
            background-color: #0d1117; 
            font-family: 'Segoe UI', Tahoma, sans-serif; 
            height: 100vh; 
            overflow: hidden; /* Absolutely prevents page scrolling */
        }
        .sidebar { 
            background: #161b22; 
            height: 100vh; 
            border-right: 1px solid #30363d; 
            padding: 20px; 
            position: fixed; 
            width: 260px; 
            overflow-y: auto;
        }
        .content { 
            margin-left: 260px; 
            height: 100vh; 
            padding: 20px 30px; 
            display: flex; 
            flex-direction: column; 
            gap: 15px; /* Spaces out the rows perfectly */
        }
        .card { 
            background: #1c2128; 
            border: 1px solid #30363d; 
            border-radius: 10px; 
            display: flex; 
            flex-direction: column; 
        }
        .btn-primary { background: #238636; border: none; }
        .accent { color: #58a6ff; font-weight: bold; }
        
        /* The Magic Bullet for Chart.js */
        .chart-wrapper { position: relative; flex-grow: 1; min-height: 0; }
        .table-wrapper { overflow-y: auto; flex-grow: 1; min-height: 0; }
    </style>
</head>
<body>

<div class="sidebar">
    <h5 class="text-white mb-4">CloudOptima <span class="badge bg-secondary" style="font-size: 10px;">PRO</span></h5>
    
    <label class="form-label small text-muted text-uppercase">Service Category</label>
    <select id="mainCategory" class="form-select form-select-sm bg-dark text-white border-secondary mb-3">
        <option value="compute">Compute (Instances)</option>
        <option value="storage">Storage (Block/Disk)</option>
        <option value="database">Database (RDS/SQL)</option>
    </select>

    <label class="form-label small text-muted text-uppercase">Workload Profile</label>
    <select id="subCategory" class="form-select form-select-sm bg-dark text-white border-secondary mb-3"></select>

    <div id="qtySection" class="d-none">
        <label class="form-label small text-muted text-uppercase">Capacity (GB)</label>
        <input type="number" id="storageQty" class="form-control form-control-sm bg-dark text-white border-secondary mb-3" value="100">
    </div>

    <label class="form-label small text-muted text-uppercase">Deployment Region</label>
    <select id="regionSelect" class="form-select form-select-sm bg-dark text-white border-secondary mb-3">
        <option value="us-east">US East (N. Virginia)</option>
        <option value="india-mumbai">India (Mumbai)</option>
        <option value="eu-west">Europe (London)</option>
    </select>

    <label class="form-label small text-muted text-uppercase">Billing Plan</label>
    <select id="planSelect" class="form-select form-select-sm bg-dark text-white border-secondary mb-4">
        <option value="ondemand">On-Demand</option>
        <option value="1year">1-Year Reserved (-35%)</option>
        <option value="3year">3-Year Reserved (-60%)</option>
    </select>
    <label class="form-label small text-muted text-uppercase">Project Use-Case</label>
    <textarea id="useCase" class="form-control bg-dark text-white border-secondary mb-4" rows="2" placeholder="e.g., Hosting a university NLP project..."></textarea>

    <button id="analyzeBtn" class="btn btn-primary w-100 fw-bold">RUN COST ANALYSIS</button>

</div>

<div class="content">
    <div class="row" style="height: 55%;">
        <div class="col-lg-8 h-100">
            <div class="card p-3 h-100">
                <h6 class="text-muted mb-2" style="font-size: 0.85rem;">MONTHLY EXPENDITURE PROJECTION (USD)</h6>
                <div class="chart-wrapper">
                    <canvas id="costChart"></canvas>
                </div>
            </div>
        </div>
        <div class="col-lg-4 h-100">
            <div class="card p-3 h-100 border-primary overflow-auto">
                <h6 class="accent mb-2" style="font-size: 0.85rem;">AI ARCHITECT INSIGHT</h6>
                <div id="aiAdvisor" class="small text-secondary mt-2">
                    Select a workload profile and run analysis to generate custom multi-cloud recommendations.
                </div>
            </div>
        </div>
    </div>

    <div class="row flex-grow-1" style="min-height: 0;">
        <div class="col-12 h-100">
            <div class="card p-3 h-100">
                <h6 class="text-muted mb-2" style="font-size: 0.85rem;">GRANULAR COST BREAKDOWN</h6>
                <div class="table-wrapper">
                    <table class="table table-dark table-hover mb-0" style="font-size: 0.9rem;">
                        <thead>
                            <tr class="text-muted">
                                <th>PROVIDER</th>
                                <th>SPECIFIC SKU</th>
                                <th>UNIT PRICE</th>
                                <th>PLAN SAVINGS</th>
                                <th>TOTAL/MO</th>
                            </tr>
                        </thead>
                        <tbody id="resultsBody">
                            <tr><td colspan="5" class="text-center py-4 text-muted">Awaiting Analysis...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="data.js"></script>
<script src="app.js"></script>
</body>
</html>
